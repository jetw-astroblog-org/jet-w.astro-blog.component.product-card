
name: Deploy Component Image Viewer

on:
  push:
    branches:
      # make sure this is the branch you are using
      - main

permissions:
  contents: write

jobs:
  deploy-astro-blog:
    runs-on: ubuntu-latest
    # needs: environment-prepare
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          # if your docs needs submodules, uncomment the following line
          # submodules: true

      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Build Root Package
        run: npm install && npm run build

      - name: Build Component Image Viewer
        env:
          # NODE_OPTIONS: --max_old_space_size=8692
          SITE_URL: https://jetw-astroblog-org.github.io
          BASE_PATH: /jet-w.astro-blog.component.img-viewer
        run: |-
          make build

      - name: Add .nojekyll file
        run: touch template/dist/.nojekyll

      - name: Deploy Blog to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          # This is the branch where the docs are deployed to
          branch: gh-pages
          folder: 'template/dist'

